<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | ThriveMom™</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preload" href="fonts/lexend-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="styles.css?v=10">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-content {
      max-width: 480px;
    }
    .error-emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    .error-content h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--purple-deep);
      margin-bottom: 0.75rem;
    }
    .error-content p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .error-links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-links a {
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .error-links a:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .error-links .primary {
      background: var(--gradient);
      color: white;
    }
    .error-links .secondary {
      background: var(--purple-wash);
      color: var(--purple-mid);
      border: 1px solid var(--purple-pale);
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <main id="main" class="error-page">
    <div class="error-content">
      <div class="error-emoji">&#129504;</div>
      <h1>Oops, brain fog moment.</h1>
      <p>This page doesn't exist. Your ADHD brain didn't break it, we promise. Let's get you back on track.</p>
      <div class="error-links">
        <a href="/" class="primary">Back to Home</a>
        <a href="/faq.html" class="secondary">FAQ</a>
      </div>
    </div>
  </main>
</body>
</html>
