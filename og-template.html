<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @font-face {
      font-family: 'Lexend';
      font-weight: 400 800;
      src: url('fonts/lexend-latin.woff2') format('woff2');
    }
    body {
      width: 1200px;
      height: 630px;
      font-family: 'Lexend', sans-serif;
      background: linear-gradient(135deg, #2c1a47 0%, #4A3370 50%, #6b4fa0 100%);
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* Subtle background circles */
    body::before {
      content: '';
      position: absolute;
      top: -100px; right: -50px;
      width: 400px; height: 400px;
      background: rgba(168, 153, 230, 0.12);
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -80px; left: 200px;
      width: 300px; height: 300px;
      background: rgba(168, 153, 230, 0.08);
      border-radius: 50%;
    }

    .left {
      flex: 1;
      padding: 60px 55px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      padding: 6px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 28px;
      width: fit-content;
    }

    h1 {
      font-size: 42px;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    h1 span {
      background: linear-gradient(135deg, #e8e0f5, #a899e6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 17px;
      color: rgba(255,255,255,0.65);
      line-height: 1.55;
      margin-bottom: 28px;
      max-width: 520px;
    }

    .logo-row {
      margin-top: auto;
      padding-top: 20px;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    /* Right side: heart logo */
    .right {
      width: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .heart-logo {
      width: 280px;
      height: 280px;
      border-radius: 48px;
      object-fit: cover;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,0.4));
    }

    /* Glow behind heart */
    .heart-glow {
      position: absolute;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(168,153,230,0.3) 0%, transparent 70%);
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="left">
    <div class="badge">Launching May 9, 2026</div>
    <h1>The First App Built for<br>ADHD Moms Who Can't Keep Up<br><span>...and Are Done<br>Feeling Like Failures.</span></h1>
    <p class="subtitle">So You Can Finally Feel Calm, Clear, and in Control Again.</p>
    <div class="logo-row">ThriveMom&#8482; &middot; thrivemom.app</div>
  </div>

  <div class="right">
    <div class="heart-glow"></div>
    <img class="heart-logo" src="images/heart-logo.png" alt="ThriveMom heart logo">
  </div>
</body>
</html>
