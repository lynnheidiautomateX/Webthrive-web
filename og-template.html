<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @font-face {
      font-family: 'Lexend';
      font-weight: 400 800;
      src: url('fonts/lexend-latin.woff2') format('woff2');
    }
    body {
      width: 1200px;
      height: 630px;
      font-family: 'Lexend', sans-serif;
      background: linear-gradient(135deg, #2c1a47 0%, #4A3370 50%, #6b4fa0 100%);
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* Subtle background circles */
    body::before {
      content: '';
      position: absolute;
      top: -100px; right: -50px;
      width: 400px; height: 400px;
      background: rgba(168, 153, 230, 0.12);
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -80px; left: 200px;
      width: 300px; height: 300px;
      background: rgba(168, 153, 230, 0.08);
      border-radius: 50%;
    }

    .content {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      gap: 32px;
    }

    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      padding: 10px 28px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .heart-logo {
      width: 220px;
      height: 220px;
      border-radius: 44px;
      object-fit: cover;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,0.35));
    }

    .heart-glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(168,153,230,0.25) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
    }

    .brand {
      font-size: 48px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .brand sup {
      font-size: 18px;
      vertical-align: super;
      opacity: 0.6;
    }

    .tagline {
      display: none;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="badge">Launching May 9, 2026</div>
    <div style="position:relative;display:flex;align-items:center;justify-content:center;">
      <div class="heart-glow"></div>
      <img class="heart-logo" src="images/heart-logo.png" alt="ThriveMom heart logo">
    </div>
    <div class="brand">ThriveMom<sup>&#8482;</sup></div>
    <div class="tagline">thrivemom.app</div>
  </div>
</body>
</html>
